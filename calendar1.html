<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agendá tu llamada | Creamos Negocios</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,800;1,600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010308; color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        .bg-glow {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            width: 100vw; height: 80vh; background: rgba(34, 116, 242, 0.12); 
            filter: blur(140px); z-index: -1; border-radius: 50%; pointer-events: none;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 30px; }
        
        h1 { font-size: 2.2rem; font-weight: 800; line-height: 1.25; margin-bottom: 10px; }
        .subtitle { color: #8892b0; font-size: 1.05rem; margin-bottom: 40px; }
        
        .text-orange { 
            color: #f25522; background: linear-gradient(90deg, #f25522 0%, #ffad91 40%, #f25522 80%);
            background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: shineText 4s linear infinite;
        }
        @keyframes shineText { to { background-position: 200% center; } }

        /* Contenedor del Calendario Custom */
        .calendar-ui {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px); text-align: left; position: relative;
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
        }

        @media (max-width: 768px) {
            .calendar-ui { grid-template-columns: 1fr; padding: 25px 20px; gap: 30px; }
            h1 { font-size: 1.7rem; }
        }

        .panel-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;}
        
        /* Días Disponibles */
        .dates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; }
        .date-btn {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            padding: 15px 10px; color: #cbd5e1; cursor: pointer; text-align: center; transition: all 0.2s ease;
        }
        .date-btn:hover:not(:disabled) { border-color: #f25522; background: rgba(242, 85, 34, 0.05); }
        .date-btn.active { background: #f25522; border-color: #f25522; color: #fff; box-shadow: 0 4px 15px rgba(242, 85, 34, 0.4); }
        .date-btn span.day-name { display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
        .date-btn span.day-num { display: block; font-size: 1.3rem; font-weight: 800; }

        /* Horas Disponibles */
        .times-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .time-btn {
            background: transparent; border: 1px solid #4a5568; border-radius: 6px;
            padding: 12px; color: #fff; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: inherit;
        }
        .time-btn:hover { border-color: #f25522; color: #f25522; }
        .time-btn.selected { background: #f25522; border-color: #f25522; color: #fff; }

        /* Estados de Carga y Confirmación */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 3, 8, 0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; border-radius: 16px; z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(242, 85, 34, 0.2);
            border-top: 3px solid #f25522; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .confirm-box { margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: none; animation: fadeIn 0.4s ease; }
        .btn-confirm {
            width: 100%; background: #f25522; color: #fff; border: none; padding: 16px; font-size: 1.05rem;
            font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease;
        }
        .btn-confirm:hover { background: #ff6a3b; box-shadow: 0 8px 25px rgba(242, 85, 34, 0.4); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .success-state { text-align: center; display: none; padding: 40px 20px; }
        .success-icon { font-size: 4rem; color: #f25522; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <img src="assets/logo-cn.png" alt="Creamos Negocios" class="logo">
        
        <div id="header-area">
            <h1>Seleccioná tu <span class="text-orange">Fecha y Hora</span></h1>
            <p class="subtitle">Evaluación Estratégica · 1 Hora · Zoom</p>
        </div>

        <div class="calendar-ui" id="calendarUI">
            <div class="loading-overlay" id="loader">
                <div class="spinner"></div>
            </div>

            <div>
                <h3 class="panel-title">1. Elige un día</h3>
                <div class="dates-grid" id="datesContainer">
                    </div>
            </div>

            <div>
                <h3 class="panel-title">2. Elige un horario</h3>
                <div id="timesContainer">
                    <p style="color: #4a5568; font-size: 0.9rem;">Selecciona un día para ver disponibilidad.</p>
                </div>
                
                <div class="confirm-box" id="confirmBox">
                    <p style="font-size: 0.9rem; color: #cbd5e1; margin-bottom: 15px;">Hora seleccionada: <strong id="selectedTimeText" style="color: #fff;"></strong></p>
                    <button class="btn-confirm" id="btnBookNow">Confirmar Reserva</button>
                </div>
            </div>
        </div>

        <div class="calendar-ui success-state" id="successState" style="display: none; justify-content: center;">
            <div>
                <div class="success-icon">✓</div>
                <h2 style="font-size: 1.8rem; margin-bottom: 15px;">¡Llamada Agendada!</h2>
                <p style="color: #cbd5e1; line-height: 1.6;">Revisa tu WhatsApp y correo electrónico. Hemos enviado los detalles de acceso a la sala de Zoom.</p>
            </div>
        </div>

    </div>

    <script>
        // URLs DE TUS WEBHOOKS DE N8N (Reemplaza estas variables)
        const WEBHOOK_GET_SLOTS = "https://n8n.creamosnegociosrentables.com/webhook/obtener-horarios"; 
        const WEBHOOK_BOOK_APPT = "https://n8n.creamosnegociosrentables.com/webhook/agendar-cita";

        let availableSlotsData = {};
        let selectedStartTime = null;
        let selectedEndTime = null;

        // Extraer parámetros de la URL (Nombre, Email, WhatsApp pasados por index.html)
        const urlParams = new URLSearchParams(window.location.search);
        const contactData = {
            firstName: urlParams.get('first_name') || '',
            email: urlParams.get('email') || '',
            phone: urlParams.get('phone') || ''
        };

        // Redirigir si alguien entra directo sin pasar por el paso 1
        if (!contactData.email) {
            window.location.href = 'index_v2.html'; 
        }

        document.addEventListener("DOMContentLoaded", initCalendar);

        async function initCalendar() {
            // 1. Calcular ventana de 14 días en Timestamps (Requerido por GHL)
            const today = new Date();
            const startTimestamp = today.getTime();
            const endTimestamp = startTimestamp + (14 * 24 * 60 * 60 * 1000);
            const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

            try {
                // 2. Fetch al Webhook A de n8n
                const response = await fetch(`${WEBHOOK_GET_SLOTS}?startDate=${startTimestamp}&endDate=${endTimestamp}&timezone=${userTimezone}`);
                const data = await response.json();
                
                // data debería devolver el objeto de GHL, típicamente { "2026-06-10": { "slots": ["2026-06-10T10:00:00Z"] } }
                // Mapeamos esa disponibilidad
                availableSlotsData = data; 
                
                renderDatesGrid();
                document.getElementById('loader').style.display = 'none';

            } catch (error) {
                console.error("Error cargando horarios:", error);
                document.getElementById('timesContainer').innerHTML = "<p style='color: #f25522;'>Error conectando con la agenda. Intenta recargar la página.</p>";
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderDatesGrid() {
            const container = document.getElementById('datesContainer');
            container.innerHTML = '';

            // Renderizar los próximos 10 días laborables desde hoy
            let daysRendered = 0;
            let currentCursor = new Date();

            while (daysRendered < 10) {
                const dateKey = currentCursor.toISOString().split('T')[0]; // "2026-06-10"
                const hasSlots = availableSlotsData[dateKey] && availableSlotsData[dateKey].slots && availableSlotsData[dateKey].slots.length > 0;

                // Si hay slots en este día, o si decides mostrar días vacíos deshabilitados:
                if (hasSlots) {
                    const dayObj = currentCursor;
                    const btn = document.createElement('div');
                    btn.className = 'date-btn';
                    
                    // Formatear día (Ej: LUN, 10)
                    const dayName = new Intl.DateTimeFormat('es-ES', { weekday: 'short' }).format(dayObj);
                    const dayNum = dayObj.getDate();

                    btn.innerHTML = `<span class="day-name">${dayName}</span><span class="day-num">${dayNum}</span>`;
                    
                    btn.onclick = () => {
                        document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderTimesGrid(dateKey);
                    };

                    container.appendChild(btn);
                    daysRendered++;
                }

                currentCursor.setDate(currentCursor.getDate() + 1);
                
                // Freno de emergencia por si el calendario está vacío
                if((currentCursor.getTime() - new Date().getTime()) > (30 * 24 * 60 * 60 * 1000)) break; 
            }

            if (container.innerHTML === '') {
                container.innerHTML = "<p style='color: #8892b0; font-size: 0.9rem; grid-column: 1 / -1;'>No hay disponibilidad esta semana.</p>";
            }
        }

        function renderTimesGrid(dateKey) {
            const container = document.getElementById('timesContainer');
            document.getElementById('confirmBox').style.display = 'none';
            container.innerHTML = '';

            const slots = availableSlotsData[dateKey].slots;
            
            const grid = document.createElement('div');
            grid.className = 'times-grid';

            slots.forEach(slotIso => {
                // slotIso = "2026-06-10T10:00:00-05:00"
                const dateObj = new Date(slotIso);
                const timeString = new Intl.DateTimeFormat('es-ES', { hour: '2-digit', minute: '2-digit', hour12: true }).format(dateObj);

                const btn = document.createElement('button');
                btn.className = 'time-btn';
                btn.innerText = timeString;

                btn.onclick = () => {
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    
                    // GHL requiere startTime y endTime. Calculamos 1 hora después para el endTime
                    selectedStartTime = slotIso;
                    const endDateObj = new Date(dateObj.getTime() + (60 * 60 * 1000));
                    selectedEndTime = endDateObj.toISOString();

                    document.getElementById('selectedTimeText').innerText = `${timeString} - ${new Intl.DateTimeFormat('es-ES', { weekday: 'long', month: 'long', day: 'numeric' }).format(dateObj)}`;
                    document.getElementById('confirmBox').style.display = 'block';
                };

                grid.appendChild(btn);
            });

            container.appendChild(grid);
        }

        // ACCIÓN FINAL: AGENDAR
        document.getElementById('btnBookNow').addEventListener('click', async () => {
            const btn = document.getElementById('btnBookNow');
            btn.innerText = 'Procesando...';
            btn.disabled = true;
            document.getElementById('loader').style.display = 'flex';

            const payload = {
                firstName: contactData.firstName,
                email: contactData.email,
                phone: contactData.phone,
                startTime: selectedStartTime,
                endTime: selectedEndTime
            };

            try {
                // Fetch al Webhook B de n8n
                const response = await fetch(WEBHOOK_BOOK_APPT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    // Cita Exitosa
                    document.getElementById('calendarUI').style.display = 'none';
                    document.getElementById('header-area').style.display = 'none';
                    document.getElementById('successState').style.display = 'flex';
                } else {
                    throw new Error("Fallo en la reserva");
                }
            } catch(e) {
                alert("Hubo un problema al agendar. Esa hora podría haber sido tomada, intenta con otra.");
                btn.innerText = 'Confirmar Reserva';
                btn.disabled = false;
                document.getElementById('loader').style.display = 'none';
            }
        });
    </script>
</body>
</html>
